services:
  # ── Postgres + pgvector ───────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: rkp_core
      POSTGRES_USER: rkp_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - rkp_pgdata:/var/lib/postgresql/data

  # ── REST API ──────────────────────────────────────────────────────────────
  codemanager:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8007:8007"   # REST API
    env_file:
      - .env
    volumes:
      - ./docs:/app/docs
      - ~/Projects:/Users/robertkoch/Projects:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── MCP server (streamable-http) ─────────────────────────────────────────
  # Streamable-http transport avoids the SSE init-race that caused -32602 errors
  # in Claude Desktop. Endpoint: http://192.168.1.189:8008/mcp
  # This service is not started by default (use --profile mcp to enable).
  mcp:
    build: .
    command: ["python", "mcp_server.py", "--http"]
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8008:8008"   # MCP streamable-http
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - mcp

  # ── Cloudflare Tunnel ─────────────────────────────────────────────────────
  # Requires cloudflare/config.yml to be filled in with real tunnel ID.
  # Enable with:  docker compose --profile tunnel up
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --config /etc/cloudflared/config.yml run
    restart: unless-stopped
    volumes:
      - ./cloudflare/config.yml:/etc/cloudflared/config.yml:ro
      # Mount your tunnel credentials (created by `cloudflared tunnel create`):
      - ~/.cloudflared:/root/.cloudflared:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - tunnel

volumes:
  rkp_pgdata:
